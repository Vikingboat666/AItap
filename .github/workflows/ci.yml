name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-suffix: lint

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: Typecheck (pyright / py3.10 / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-suffix: typecheck-${{ matrix.os }}

      - name: Set up Python 3.10 (lower bound)
        run: uv python install 3.10

      - name: Sync dev dependencies
        run: uv sync --group dev --python 3.10

      - name: pyright
        run: uv run pyright

  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-suffix: test-${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dev dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: pytest
        run: uv run pytest --cov=aitap --cov-report=term-missing

  docs:
    name: Docs (mkdocs build --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-suffix: docs

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync docs dependencies
        run: uv sync --group docs

      - name: mkdocs build --strict
        run: uv run --group docs mkdocs build --strict
