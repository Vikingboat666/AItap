repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^(LICENSE|.*\.svg)$
      - id: trailing-whitespace
        exclude: \.md$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.371
    hooks:
      - id: pyright
        additional_dependencies:
          - pydantic>=2.6
          - pydantic-settings>=2.2
          - typer>=0.12
          - fastapi>=0.110

  - repo: local
    hooks:
      - id: no-hardcoded-local-paths
        name: block hardcoded developer local paths
        language: pygrep
        entry: 'C:[\\/]Users[\\/]\S+|D:[\\/](?:AIcoding|aitap-)|/home/[a-z]+/[A-Za-z]|/Users/[A-Za-z]+/[A-Za-z]'
        types: [text]
        exclude: ^(\.gitignore|\.pre-commit-config\.yaml|CLAUDE\.md|uv\.lock|.*\.ipynb)$
